version: '3.8'

services:
  # ========================
  # PostgreSQL Database
  # ========================
  db:
    image: postgres:16-alpine
    container_name: dath-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-DATH}
    ports:
      - "5432:5432"
    volumes:
      # Mount database initialization script
      - ./DATH/database.sql:/docker-entrypoint-initdb.d/init.sql
      # Persist database data
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # MailDev (Email Testing)
  # ========================
  maildev:
    image: maildev/maildev
    container_name: dath-maildev
    restart: always
    ports:
      # Web UI
      - "1080:1080"
      # SMTP port
      - "587:1025"
    networks:
      - app-network

  # ========================
  # Backend API (DATH)
  # ========================
  backend:
    build:
      context: ./DATH
      dockerfile: Dockerfile
    container_name: dath-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Database Configuration
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-DATH}
      DB_HOST: db
      DB_PORT: 5432
      
      # Application Configuration
      PORT: 8080
      NODE_ENV: ${NODE_ENV:-development}
      
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_long_random_secret_key_minimum_32_characters}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      
      # Email Configuration
      EMAIL_HOST: ${EMAIL_HOST:-maildev}
      EMAIL_PORT: ${EMAIL_PORT:-1025}
      EMAIL_USER: ${EMAIL_USER:-smtp_user}
      EMAIL_PASS: ${EMAIL_PASS:-smtp_pass}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_FROM: ${EMAIL_FROM:-Dev <noreply@example.com>}
      
      # URL Configuration
      SERVER_URL: ${SERVER_URL:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000/MarketPlace}
    volumes:
      # Mount uploads directory for file persistence
      - ./DATH/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      maildev:
        condition: service_started
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================
  # Frontend (MarketPlace)
  # ========================
  frontend:
    build:
      context: ./MarketPlace
      dockerfile: Dockerfile
    container_name: marketplace-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      # API Configuration
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8080}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - backend
    networks:
      - app-network
    stdin_open: true
    tty: true

# ========================
# Networks
# ========================
networks:
  app-network:
    driver: bridge

# ========================
# Volumes
# ========================
volumes:
  postgres_data:
    driver: local
